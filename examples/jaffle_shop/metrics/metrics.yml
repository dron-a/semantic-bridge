metrics:
  - name: revenue
    description: |
      Total recognized revenue across all completed orders.
      Excludes cancelled and refunded orders.
      Finance-approved definition as of 2024-Q1.
    type: simple
    label: Total Revenue
    type_params:
      measure:
        name: order_total
        fill_nulls_with: 0
    filter: |
      {{ Dimension('order_id__order_status') }} = 'completed'

  - name: order_count
    description: |
      Total number of completed orders placed.
      Deduped on order_id.
    type: simple
    label: Order Count
    type_params:
      measure:
        name: order_count
        fill_nulls_with: 0
    filter: |
      {{ Dimension('order_id__order_status') }} = 'completed'

  - name: average_order_value
    description: |
      Average value per completed order.
      Calculated as total revenue divided by order count.
      Use for pricing and promotion analysis.
    type: ratio
    label: Average Order Value
    type_params:
      numerator:
        name: order_total
        filter: |
          {{ Dimension('order_id__order_status') }} = 'completed'
      denominator:
        name: order_count
        filter: |
          {{ Dimension('order_id__order_status') }} = 'completed'

  - name: gross_profit
    description: |
      Revenue minus cost of goods sold.
      Derived from revenue and order_cost measures.
    type: derived
    label: Gross Profit
    type_params:
      expr: revenue - order_cost
      metrics:
        - name: revenue
        - name: order_cost

  - name: customer_count
    description: |
      Total number of distinct active customers.
    type: simple
    label: Customer Count
    type_params:
      measure:
        name: customer_count
        fill_nulls_with: 0

  - name: churn_rate
    description: |
      Percentage of customers who churned in the period.
      Calculated as churned customers divided by total customers.
      Key retention metric — reviewed weekly by Customer Success.
    type: ratio
    label: Churn Rate
    type_params:
      numerator:
        name: churned_customer_count
      denominator:
        name: customer_count
